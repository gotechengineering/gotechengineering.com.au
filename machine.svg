<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- <pattern id="cadGrid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#172a45" stroke-width="0.5" />
      <path d="M 25 0 L 25 50 M 0 25 L 50 25" fill="none" stroke="#172a45" stroke-width="0.2" opacity="0.5" />
    </pattern> -->

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <g id="flywheel-face">
      <circle cx="0" cy="0" r="220" fill="none" stroke="#00F0FF" stroke-width="2" />
      <circle cx="0" cy="0" r="190" fill="none" stroke="#00F0FF" stroke-width="1.5" />
      <circle cx="0" cy="0" r="180" fill="none" stroke="#00F0FF" stroke-width="0.5" stroke-dasharray="4 4" />
      
      <circle cx="0" cy="0" r="50" fill="none" stroke="#00F0FF" stroke-width="2" />
      <circle cx="0" cy="0" r="30" fill="none" stroke="#00F0FF" stroke-width="1" />
      <circle cx="0" cy="0" r="20" fill="none" stroke="#FF0055" stroke-width="1.5" stroke-dasharray="2 2" />

      <g stroke="#00F0FF" stroke-width="2">
        <path d="M 0 -50 L 0 -190" />
        <path d="M 0 50 L 0 190" />
        <g transform="rotate(60)">
          <path d="M 0 -50 L 0 -190" />
          <path d="M 0 50 L 0 190" />
        </g>
        <g transform="rotate(120)">
          <path d="M 0 -50 L 0 -190" />
          <path d="M 0 50 L 0 190" />
        </g>
      </g>

      <g fill="#080c16" stroke="#00F0FF" stroke-width="1.5">
        <circle cx="0" cy="-205" r="5" />
        <circle cx="0" cy="205" r="5" />
        <g transform="rotate(60)"><circle cx="0" cy="-205" r="5" /><circle cx="0" cy="205" r="5" /></g>
        <g transform="rotate(120)"><circle cx="0" cy="-205" r="5" /><circle cx="0" cy="205" r="5" /></g>
      </g>
    </g>

    <g id="rim-ring">
      <circle cx="0" cy="0" r="220" fill="none" stroke="#00F0FF" stroke-width="0.5" opacity="0.3" />
      <!-- <circle cx="0" cy="0" r="190" fill="none" stroke="#00F0FF" stroke-width="0.5" opacity="0.3" /> -->
      <!-- <circle cx="0" cy="0" r="50" fill="none" stroke="#00F0FF" stroke-width="0.5" opacity="0.3" /> -->
    </g>
  </defs>

  <rect width="100%" height="100%" fill="#060913" />
  <rect width="100%" height="100%" fill="url(#cadGrid)" />

  <g font-family="'Courier New', monospace" font-size="14" fill="#00F0FF" opacity="0.8">
    <text x="30" y="40" font-weight="bold" font-size="18">SYS.CAD // RENDER_MODE</text>
    <text x="30" y="70">FILE: HIGH_MASS_FLYWHEEL.obj</text>
    <text x="30" y="90">PROJ: ISOMETRIC OFFSET</text>
    <text x="30" y="110">MASS: 450.2 KG</text>
    <text x="30" y="130">RPM : <animate attributeName="opacity" values="0.3; 1; 0.3" dur="0.2s" repeatCount="indefinite"/>7200</text>
    
    <line x1="0" y1="300" x2="800" y2="300" stroke="#172a45" stroke-width="1.5" />
    <line x1="400" y1="0" x2="400" y2="600" stroke="#172a45" stroke-width="1.5" />
  </g>

  <g transform="translate(400, 300)" filter="url(#glow)">
    
    <line x1="0" y1="-250" x2="0" y2="250" stroke="#FF0055" stroke-width="1.5" stroke-dasharray="12 6" />

    <g transform="translate(0, 80) scale(1, 0.4)">
      <g opacity="0.25">
        <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="3s" repeatCount="indefinite" />
        <use href="#flywheel-face" />
      </g>
    </g>

    <g transform="translate(0, 50) scale(1, 0.4)"><use href="#rim-ring" /></g>
    <g transform="translate(0, 20) scale(1, 0.4)"><use href="#rim-ring" /></g>
    <g transform="translate(0, -20) scale(1, 0.4)"><use href="#rim-ring" /></g>
    <g transform="translate(0, -50) scale(1, 0.4)"><use href="#rim-ring" /></g>

    <g transform="translate(0, -80) scale(1, 0.4)">
      <g opacity="1">
        <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="3s" repeatCount="indefinite" />
        <use href="#flywheel-face" />
      </g>
    </g>

    <line x1="-220" y1="-80" x2="-220" y2="80" stroke="#00F0FF" stroke-width="2" opacity="0.8" />
    <line x1="220" y1="-80" x2="220" y2="80" stroke="#00F0FF" stroke-width="2" opacity="0.8" />
    <line x1="-190" y1="-80" x2="-190" y2="80" stroke="#00F0FF" stroke-width="1" opacity="0.5" />
    <line x1="190" y1="-80" x2="190" y2="80" stroke="#00F0FF" stroke-width="1" opacity="0.5" />
    <line x1="-50" y1="-80" x2="-50" y2="80" stroke="#00F0FF" stroke-width="2" opacity="0.8" />
    <line x1="50" y1="-80" x2="50" y2="80" stroke="#00F0FF" stroke-width="2" opacity="0.8" />

    <line x1="-250" y1="-150" x2="250" y2="-150" stroke="#FF0055" stroke-width="2" opacity="0.6">
      <animate attributeName="y1" values="-150; 150; -150" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
      <animate attributeName="y2" values="-150; 150; -150" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
    </line>

  </g>
</svg>
